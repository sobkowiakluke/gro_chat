{% extends "base.html" %}

{% block content %}

<h1>Chat</h1>

<div id="chat-box" class="chat-box"></div>

<div class="chat-input">
    <textarea id="msg" placeholder="Napisz wiadomość..."></textarea>
    <button onclick="sendMsg()">Wyślij</button>
</div>

<div class="context-box">
    <label>Kontekst (dodawany do promptu)</label>
    <textarea id="contextBox" placeholder="Wpisz dodatkowy kontekst lub kliknij plik z lewej..."></textarea>
</div>

<script>
/* =======================
   MODELE
======================= */
let chatHistory = [];
async function loadModels() {
    const select = document.getElementById("modelSelect");

    try {
        const res = await fetch("/models");
        const models = await res.json();

        select.innerHTML = "";

        models.forEach((m, index) => {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m;

            if (index === 0 || m.includes("llama-3.1-8b-instant")) {
                opt.selected = true;
            }

            select.appendChild(opt);
        });

    } catch (err) {
        console.error("Model load error:", err);
    }
}

function getSelectedModel() {
    const el = document.getElementById("modelSelect");
    return el ? el.value : "llama-3.1-8b-instant";
}


/* =======================
   CHAT
======================= */

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function formatReply(text) {
    // blok kodu ```
    text = text.replace(/```([\s\S]*?)```/g, function(match, code) {
        return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
    });

    // inline `code`
    text = text.replace(/`([^`]+)`/g, function(match, code) {
        return `<code class="inline-code">${escapeHtml(code)}</code>`;
    });

    // zwykłe nowe linie → <br>
    text = text.replace(/\n/g, "<br>");

    return text;
}

async function sendMsg() {
    const input = document.getElementById("msg");
    const box = document.getElementById("chat-box");
    const contextEl = document.getElementById("contextBox");

    const message = input.value.trim();
    const context = contextEl ? contextEl.value.trim() : "";
    const model = getSelectedModel();

    if (!message) return;

    input.value = "";

    box.innerHTML += `<div class="user">Ty: ${message}</div>`;

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: message,
                model: model,
                context: context,
                history: chatHistory.slice(-10) // BEZ aktualnej wiadomości
            })
        });

        const data = await res.json();

        const formatted = formatReply(data.reply);

        box.innerHTML += `<div class="bot">${formatted}</div>`;
        box.scrollTop = box.scrollHeight;

        // ✅ dopiero TERAZ zapisujemy historię
        chatHistory.push({
            role: "user",
            content: message
        });

        chatHistory.push({
            role: "assistant",
            content: data.reply
        });

    } catch (err) {
        console.error("CHAT ERROR:", err);
    }
}

/* =======================
   ENTER / SHIFT+ENTER
======================= */
document.addEventListener("DOMContentLoaded", () => {
    loadModels();
    loadGitTree();

    const input = document.getElementById("msg");

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });
});


/* =======================
   DRZEWO GIT
======================= */
function renderTree(node, container, basePath = "") {
    const ul = document.createElement("ul");

    for (const key in node) {
        if (key === "_files") continue;

        const li = document.createElement("li");
        li.textContent = "📁 " + key;

        const childContainer = document.createElement("div");
        childContainer.style.marginLeft = "15px";

        renderTree(node[key], childContainer, basePath + key + "/");

        li.appendChild(childContainer);
        ul.appendChild(li);
    }

    if (node._files) {
        node._files.forEach(file => {
            const li = document.createElement("li");
            li.textContent = "📄 " + file;
            li.className = "git-file";

            const fullPath = basePath + file;

            li.onclick = () => loadFile(fullPath);

            ul.appendChild(li);
        });
    }

    container.appendChild(ul);
}

async function loadGitTree() {
    const container = document.getElementById("gitTree");

    try {
        const res = await fetch("/git-tree");
        const tree = await res.json();

        container.innerHTML = "";
        renderTree(tree, container);

    } catch (err) {
        console.error("Git tree error:", err);
    }
}


/* =======================
   ŁADOWANIE PLIKU → CONTEXT
======================= */
async function loadFile(path) {
    console.log("LOADING FILE:", path);

    try {
        const res = await fetch(`/file?path=${encodeURIComponent(path)}`);
        const data = await res.json();

        if (data.error) {
            console.error(data.error);
            return;
        }

        const contextBox = document.getElementById("contextBox");

        contextBox.value =
`FILE: ${data.path}

${data.content}`;

    } catch (err) {
        console.error("FILE LOAD ERROR:", err);
    }
}
</script>

{% endblock %}
