<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="header">
    <div class="logo">Moja aplikacja</div>

    <div class="user-box">
        <div class="user-circle"></div>
        <div class="user-name">Zalogowany</div>
        <a class="logout-btn" href="/logout">Wyloguj</a>
    </div>
</header>

<div class="container">
    <aside class="sidebar">

        <label style="font-size:12px; color:#94a3b8;">Model Groq</label>
        <select id="modelSelect"></select>

        <ul>
            <li><a href="/">Strona główna</a></li>
            <li><a href="#">Opcja 1</a></li>
            <li><a href="#">Opcja 2</a></li>
            <li><a href="/logout">Wyloguj</a></li>
        </ul>
        <div class="git-tree">
            <label>Repo</label>
            <div id="gitTree"></div>
        </div>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>
